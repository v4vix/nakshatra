<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="50%" stop-color="#0D2137"/>
      <stop offset="100%" stop-color="#061020"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="50%" stop-color="#FFCC70"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="rgba(255,179,71,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,179,71,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="1.5" fill="#FFB347" opacity="0.6"/>
  <circle cx="300" cy="150" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="500" cy="60" r="1.5" fill="#FFB347" opacity="0.5"/>
  <circle cx="700" cy="120" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="900" cy="70" r="2" fill="#FFB347" opacity="0.7"/>
  <circle cx="1100" cy="100" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="200" cy="500" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="400" cy="550" r="1" fill="#FFB347" opacity="0.4"/>
  <circle cx="800" cy="520" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="1050" cy="480" r="1" fill="#FFB347" opacity="0.5"/>
  <!-- Central star symbol -->
  <text x="600" y="220" text-anchor="middle" font-size="80" fill="url(#gold)">✦</text>
  <!-- Title -->
  <text x="600" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="url(#gold)" letter-spacing="6">NAKSHATRA</text>
  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#C8B8A0" letter-spacing="4">VEDIC WISDOM QUEST</text>
  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="rgba(200,184,160,0.6)" letter-spacing="1">Kundli  ·  Tarot  ·  Numerology  ·  Panchanga  ·  Vastu  ·  Scriptures</text>
  <!-- Divider line -->
  <line x1="400" y1="470" x2="800" y2="470" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- Bottom tagline -->
  <text x="600" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="rgba(200,184,160,0.5)">Discover your cosmic destiny through ancient Vedic sciences</text>
  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="12" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>
</svg>
