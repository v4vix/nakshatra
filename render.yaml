services:
  # ── Nakshatra: single Node service (backend serves frontend static files) ─────
  - type: web
    name: nakshatra-app
    runtime: node
    plan: free
    region: oregon
    # No rootDir — build runs from repo root so we can build both sub-projects
    buildCommand: >
      cd nakshatra/backend && npm ci && npm run build && mkdir -p data public &&
      cd ../frontend && npm ci && npm run build &&
      cp -r dist/. ../backend/public/
    startCommand: cd nakshatra/backend && node dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      # ── Required secrets (set in Render dashboard) ─────────────────────────
      - key: ADMIN_PASSWORD
        sync: false          # default: nakshatra_adm1n  (change for prod)
      - key: DEMO_PASSWORD
        sync: false          # default: nakshatra123      (change for prod)
      - key: ADMIN_TOKEN
        generateValue: true
      # ── AI keys — waterfall: Ollama → Groq → OpenAI → Anthropic ──────────
      - key: GROQ_API_KEY
        sync: false          # free tier — https://console.groq.com
      - key: OPENAI_API_KEY
        sync: false          # gpt-4o-mini, cheap fallback
      - key: OPENAI_BASE_URL
        sync: false          # override to use Groq/Together-compatible endpoint
      - key: OPENAI_MODEL
        sync: false          # default: gpt-4o-mini
      - key: ANTHROPIC_API_KEY
        sync: false          # claude-haiku, final cloud fallback
      # ── Optional integrations ──────────────────────────────────────────────
      - key: REVENUECAT_API_KEY
        sync: false
